x-host-gateway: &host-gateway
  extra_hosts:
    # Rootful default: host-gateway (Docker resolves to host IP).
    # Rootless: set HOST_GATEWAY_IP in .env via docker/build_wrapper.py build (often 10.0.2.2).
    - "host.docker.internal:${HOST_GATEWAY_IP:-host-gateway}"

services:
  inf-splitter:
    build:
      context: ../inf-splitter.git
    image: inf-splitter:latest
    volumes:
      - ${INF_SPLITTER_CONFIG_DIR:-../inf-splitter.git}/config:/app/config:ro
      - ${INF_SPLITTER_SECRETS_DIR:-../inf-splitter.git/secrets}:/app/secrets:ro
    <<: *host-gateway
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${PROXY_PORT:-3000}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  claude:
    build:
      context: .
      target: runtime
      args:
        NODE_VERSION: ${NODE_VERSION:-22.12.0}
        YARN_VERSION: ${YARN_VERSION:-4.15.0}
        SOCKS_PORT: ${SOCKS_PORT:-1080}
        HOST_GATEWAY_IP: ${HOST_GATEWAY_IP:-${SOCKS_HOST:-${EXTERNAL_IP:-host-gateway}}}
        SOCKS_HOST: ${SOCKS_HOST:-}
        EXTERNAL_IP: ${EXTERNAL_IP:-}
        CLAUDE_TARGET: ${CLAUDE_TARGET:-stable}
        ASTRO_VERSION: ${ASTRO_VERSION:-6.4.2}
        OH_MY_ZSH_VERSION: ${OH_MY_ZSH_VERSION:-70ad5e3df8f7bed68aa6672029496926e632aedd}
        DEV_UID: ${DEV_UID:-1000}
        DEV_GID: ${DEV_GID:-1000}
    image: claude:latest
    stdin_open: true
    tty: true
    working_dir: ${PROJECT_PATH_1:?set PROJECT_PATH_1}
    volumes:
      - ${PROJECT_PATH_1:?set PROJECT_PATH_1}:${PROJECT_PATH_1:?set PROJECT_PATH_1}
    environment:
      CLAUDE_CODE_AUTO_COMPACT_WINDOW: 900000
      CHOWN_WORK_ON_START: ${CHOWN_WORK_ON_START:-1}
      PROJECT_PATH_1: ${PROJECT_PATH_1:?set PROJECT_PATH_1}
      PROJECT_PATH_2: ${PROJECT_PATH_2:-}
      PROJECT_PATH_3: ${PROJECT_PATH_3:-}
      ANTHROPIC_BASE_URL: http://inf-splitter:${PROXY_PORT:-3000}/anthropic
      ANTHROPIC_AUTH_TOKEN: dummy
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-deepseek-v4-pro[1m]}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-deepseek-v4-pro[1m]}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-deepseek-v4-pro[1m]}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-gemma4:31b}
      CLAUDE_CODE_SUBAGENT_MODEL: ${CLAUDE_CODE_SUBAGENT_MODEL:-gemma4:31b}
      CLAUDE_CODE_EFFORT_LEVEL: ${CLAUDE_CODE_EFFORT_LEVEL:-max}
    <<: *host-gateway
